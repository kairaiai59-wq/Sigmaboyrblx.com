<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông báo</title>
    <style>
        /* Thiết lập nền toàn trang */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #6a0dad; /* Màu tím */
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
        }

        /* Khung nội dung chính */
        .container {
            padding: 20px;
        }

        /* Định dạng dòng chữ thông báo */
        h1 {
            font-size: 3rem; /* Chữ bự */
            margin-bottom: 30px;
            font-weight: bold;
        }

        /* Định dạng nút Next */
        .btn-next {
            background-color: white;
            color: #6a0dad;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        /* Hiệu ứng khi di chuột vào nút */
        .btn-next:hover {
            background-color: #f0f0f0;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>WED đã bị hỏng vui lòng chờ...</h1>
        <button class="btn-next" onclick="nextAction()">Next</button>
    </div>

    <script>
        function nextAction() {
            // Bạn có thể thay đổi hành động khi nhấn nút ở đây
            alert("Bạn đã nhấn nút Next!");
        }
    </script>

</body>
</html>
